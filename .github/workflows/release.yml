name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build release archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          mkdir -p dist
          for target in \
            darwin/amd64 \
            darwin/arm64 \
            linux/amd64 \
            linux/arm64 \
            windows/amd64 \
            windows/arm64
          do
            os="${target%/*}"
            arch="${target#*/}"
            binary=subgen
            if [ "$os" = windows ]; then binary=subgen.exe; fi
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags="-s -w -X main.version=${version}" \
              -o "dist/${binary}" ./cmd/subgen
            if [ "$os" = windows ]; then
              (cd dist && zip -q "subgen_${os}_${arch}.zip" "$binary")
            else
              (cd dist && tar -czf "subgen_${os}_${arch}.tar.gz" "$binary")
            fi
            rm "dist/${binary}"
          done
          (cd dist && sha256sum subgen_* > checksums.txt)

      - name: Smoke test Linux x64
        run: |
          mkdir -p /tmp/subgen-smoke
          tar -xzf dist/subgen_linux_amd64.tar.gz -C /tmp/subgen-smoke
          test "$(/tmp/subgen-smoke/subgen version)" = "subgen ${GITHUB_REF_NAME#v}"

      - name: Generate Changelog
        run: |
          git fetch --tags --force
          prev_tag=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "## O que mudou nesta versão" > changelog.md
          echo "" >> changelog.md
          if [ -n "$prev_tag" ]; then
            echo "Comparando com a versão anterior: \`$prev_tag\`" >> changelog.md
            echo "" >> changelog.md
            git log "${prev_tag}..${GITHUB_REF_NAME}" --pretty=format:"* %s (%h)" >> changelog.md
            echo "" >> changelog.md
            echo "" >> changelog.md
            echo "**Changelog completo**: https://github.com/${{ github.repository }}/compare/${prev_tag}...${GITHUB_REF_NAME}" >> changelog.md
          else
            git log --pretty=format:"* %s (%h)" >> changelog.md
          fi
          cat changelog.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* -F changelog.md --verify-tag
